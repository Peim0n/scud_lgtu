# ── Сдвиговый регистр ──
# Управляет выходными сигналами: реле, индикаторы, биперы
shift:
  ser_data: PA6      # Пин данных (SER)
  ser_clk:  PA19     # Пин тактового сигнала (SRCLK)
  ser_latch: PA7     # Пин защелки (RCLK)
  reg_len:  16       # Разрядность сдвигового регистра (бит)

# ── Мультиплексор ──
# Мультиплексирует входные сигналы: датчики, кнопки, тревога
mux:
  addr_pins:
    A0: PA6          # Адресный пин 0
    A1: PA11         # Адресный пин 1
    A2: PA12         # Адресный пин 2
  input_pin: PL11    # Пин чтения данных с мультиплексора

# ── Wiegand-считыватели ──
# Считыватели карт с протоколом Wiegand
# Имена пинов в формате PA<N>, PG<N>, PL<N> единообразно со всем конфигом.
# encrypted: true  — если считыватель передаёт зашифрованные данные.
# decrypt_key: ... — ключ/секрет для расшифровки (алгоритм задаётся в коде).
wiegand:
  - label: Wiegand-1
    d0: PA10         # DATA0 (GPIO)
    d1: PA2          # DATA1 (GPIO)
    type: era_mf_64_hash
    encrypted: false
    # decrypt_key: ""

  - label: Wiegand-2
    d0: PA3          # DATA0 (GPIO)
    d1: PA18         # DATA1 (GPIO)
    type: era_mf_64_hash
    encrypted: false
    # decrypt_key: ""

# ── Серийные порты ──
# Для QR-считывателей и других устройств с последовательным интерфейсом
serial:
  - label: Serial-1
    port: /dev/ttyS1
    baud: 115200     # Скорость передачи (baud)

  - label: Serial-2
    port: /dev/ttyS2
    baud: 115200     # Скорость передачи (baud)

# ── Устройства ──
# Описание физических устройств и их ролей в системе
devices:
  # Мапинг полных имен reader из engine к логическим именам устройств
  reader_names:
    wiegand_Wiegand-1: entry_card_reader
    wiegand_Wiegand-2: exit_card_reader
    serial_Serial-1: entry_qr_reader
    serial_Serial-2: exit_qr_reader

  # Считыватели (Wiegand и Serial/QR)
  readers:
    entry_card_reader:
      label: "Wiegand-1"        # Ссылка на wiegand label
      type: "wiegand"           # Тип: wiegand или serial
      direction: "entry"        # Сторона: entry (вход) или exit (выход)
      indicator_success: "w1_green"  # Индикатор успеха (shift pin name)
      indicator_fail: "w1_red"       # Индикатор отказа (shift pin name)
      buzzer: "w1_beep"         # Бипер считывателя (shift pin name)

    exit_card_reader:
      label: "Wiegand-2"        # Ссылка на wiegand label
      type: "wiegand"           # Тип: wiegand или serial
      direction: "exit"         # Сторона: entry (вход) или exit (выход)
      indicator_success: "w2_green"  # Индикатор успеха (shift pin name)
      indicator_fail: "w2_red"       # Индикатор отказа (shift pin name)
      buzzer: "w2_beep"         # Бипер считывателя (shift pin name)

    entry_qr_reader:
      label: "Serial-1"         # Ссылка на serial label
      type: "serial"            # Тип: wiegand или serial
      direction: "entry"        # Сторона: entry (вход) или exit (выход)
      indicator_success: "w1_green"  # Индикатор успеха (shift pin name)
      indicator_fail: "w1_red"       # Индикатор отказа (shift pin name)
      buzzer: "w1_beep"         # Бипер считывателя (shift pin name)

    exit_qr_reader:
      label: "Serial-2"         # Ссылка на serial label
      type: "serial"            # Тип: wiegand или serial
      direction: "exit"         # Сторона: entry (вход) или exit (выход)
      indicator_success: "w2_green"  # Индикатор успеха (shift pin name)
      indicator_fail: "w2_red"       # Индикатор отказа (shift pin name)
      buzzer: "w2_beep"         # Бипер считывателя (shift pin name)

  # Датчики прохода
  sensors:
    entry_sensor:
      label: "sensor_1"        # Имя из mux_inputs
      direction: "entry"        # Роль: entry (вход) или exit (выход)

    exit_sensor:
      label: "sensor_2"        # Имя из mux_inputs
      direction: "exit"         # Роль: entry (вход) или exit (выход)

# ── Зоны прохода ──
passage:
  zones:
    - label: "zone1"
      entry_sensor: "sensor_1"
      exit_sensor: "sensor_2"

  # Кнопки управления
  buttons:
    entry_button:
      label: "button_1"         # Имя из mux_inputs
      action: "open_entry"      # Действие: open_entry, open_exit
      relay: "rel1"             # Реле для открытия
      open_duration: 2.0        # Время открытия в секундах

    exit_button:
      label: "button_2"         # Имя из mux_inputs
      action: "open_exit"       # Действие: open_entry, open_exit
      relay: "rel2"             # Реле для открытия
      open_duration: 2.0        # Время открытия в секундах

    # close_button:
    #   label: "button_3"         # Имя из mux_inputs
    #   action: "close"           # Действие: close (пока не используется)

  # Реле турникета
  relays:
    entry_relay:
      label: "rel1"             # Имя из shift_pins
      direction: "entry"        # Роль: entry (вход) или exit (выход)

    exit_relay:
      label: "rel2"             # Имя из shift_pins
      direction: "exit"         # Роль: entry (вход) или exit (выход)

  # Общие биперы
  buzzers:
    main_buzzer:
      label: "buz"              # Имя из shift_pins

# ── Мапинг входов мультиплексора и пинов сдвигового регистра ──
# Бизнес-логика использует эти имена для работы с датчиками и выходами
config:
  # Входы мультиплексора (0-7)
  mux_inputs:
    0: "input_0"
    1: "button_3"
    2: "sensor_2"
    3: "input_3"
    4: "sensor_1"
    5: "button_1"
    6: "alarm"
    7: "button_2"
  # Пины сдвигового регистра (номер бита, инверсия)
  shift_pins:
    w1_green: {pin: 1, inverted: false}
    w1_red: {pin: 2, inverted: false}
    w1_beep: {pin: 3, inverted: false}
    pult_buzz: {pin: 4, inverted: false}
    pult_l3: {pin: 5, inverted: false}
    pult_l2: {pin: 6, inverted: false}
    pult_l1: {pin: 7, inverted: false}
    buz: {pin: 8, inverted: false}
    w2_green: {pin: 9, inverted: false}
    w2_red: {pin: 10, inverted: false}
    w2_beep: {pin: 11, inverted: false}
    od1: {pin: 12, inverted: false}
    od2: {pin: 13, inverted: false}
    rel1: {pin: 14, inverted: false}
    rel2: {pin: 15, inverted: false}

# ── Параметры доступа ──
# STATIC_KEY — уникален для точки доступа (16 байт в hex).
# DYNAMIC_KEY — меняется ежедневно (16 байт в hex).
access:
  static_key: "0123456789abcdef0123456789abcdef"
  dynamic_key: "fedcba9876543210fedcba9876543210"

# ── Тайминги ──
# Все задержки в секундах.
timings:
  # Интервал опроса входов мультиплексора в PinControllerThread.
  # Определяет, как часто считываются состояния входных сигналов.
  # Увеличено для снижения нагрузки на CPU (было 0.02)
  mux_poll_interval_s: 0.05

  # Время установления адреса на мультиплексоре после переключения.
  # Задержка перед чтением входа после выставления адресных пинов.
  # Минимально необходимое время для стабилизации сигнала
  mux_addr_settle_s: 0.0003

  # Максимальный интервал между двумя последовательными Wiegand-битами.
  # Если пауза больше — текущий кадр сбрасывается и начинается новый.
  wiegand_bit_timeout_s: 0.025

  # Таймаут ожидания gpiod-события в Wiegand-читателе.
  # Поток блокируется в ядре не дольше этого времени, затем проверяет таймаут кадра.
  wiegand_wait_timeout_s: 0.005

  # Таймаут ожидания данных из Serial-очереди в мостовом потоке.
  # Используется в цикле передачи строк от BackgroundSerialReader в ScudEngine.
  serial_queue_timeout_s: 0.2

  # Таймаут ожидания данных из Wiegand-очереди в мостовом потоке.
  # Используется в цикле передачи CardData от WeigandReader в ScudEngine.
  event_queue_timeout_s: 0.2

  # Таймаут ожидания команды в CommandLoop.
  # Определяет, как часто проверяется очередь команд и событие остановки.
  command_queue_timeout_s: 0.2

  # Таймаут ожидания данных из mux-очереди в потоке датчиков прохода.
  # Если данных нет — поток проверяет таймауты проходов.
  mux_queue_timeout_s: 0.1

  # Интервал проверки Watchdog.
  # Период, с которым мониторятся потоки и состояние оборудования.
  watchdog_check_interval_s: 2.0

  # Таймаут остановки Watchdog.
  # Время ожидания завершения Watchdog-потока при остановке.
  watchdog_stop_timeout_s: 2.0

  # Интервал синхронизации с бэкендом.
  # Период, с которым AccessController запрашивает обновления с сервера.
  backend_sync_interval_s: 600

  # Время ожидания завершения прохода по двум датчикам.
  # Если второй датчик не сработал за это время — фиксируется разворот.
  passage_timeout_s: 2.0

  # Время фиксации заслона (оба датчика активны одновременно).
  # Если оба датчика держатся дольше этого времени — событие blockage.
  passage_blockage_timeout_s: 5.0

  # Время действия успешной авторизации.
  # После разрешения прохода человек должен пройти не позднее этого таймаута.
  auth_timeout_s: 5.0

  # Время открытия реле турникета.
  # Если человек не прошёл за это время — реле выключается по таймауту.
  relay_open_duration_s: 2.0

  # Длительность индикатора (секунды).
  # Индикатор (GREEN/RED) горит это время после включения.
  indicator_duration_s: 2.0

  # Длительность одного сигнала пищалки (секунды).
  # Каждый сигнал в последовательности длится это время.
  beep_signal_duration_s: 0.05

  # Пауза между сигналами пищалки (секунды).
  # Интервал между сигналами в последовательности.
  beep_signal_pause_s: 0.1

  # Длительность короткого писка при отказе в доступе (секунды).
  deny_beep_duration_s: 0.1

  # Пауза между короткими писками при отказе в доступе (секунды).
  deny_beep_pause_s: 0.1

  # Количество коротких писков при отказе в доступе.
  deny_beep_count: 3

  # Длительность бипера при открытии турникета (секунды).
  open_beep_duration_s: 0.1

  # Периодический бипер при тревоге - длительность ON (секунды).
  alarm_beep_on_duration_s: 0.5

  # Периодический бипер при тревоге - длительность OFF (секунды).
  alarm_beep_off_duration_s: 0.5

  # Защита от шума после валидной карты (секунды).
  # Wiegand reader игнорирует события это время после успешного чтения.
  wiegand_ignore_after_valid_s: 0.05

  # Задержка при ошибках Serial-порта (секунды).
  # Время ожидания перед повторной попыткой чтения при ошибке.
  serial_retry_delay_s: 1.0

  # Таймаут join для потоков при остановке ScudEngine.
  # Время ожидания завершения всех рабочих потоков.
  thread_join_timeout_s: 5.0

  # Длительность таймера кнопки (секунды).
  # Время, после которого турникет закрывается после отжатия кнопки.
  button_timer_duration_s: 2.0

  # Время стабилизации адреса на мультиплексоре (секунды).
  # Задержка перед чтением входа после выставления адресных пинов.
  mux_addr_settle_s: 0.0005

  # Время подавления дребезга при инициализации датчиков (секунды).
  # Первые N мс после старта игнорируются.
  sensor_debounce_s: 0.5

  # Таймаут ожидания событий датчиков (секунды).
  # Ждём события не дольше этого времени, чтобы проверять running_event.
  sensor_event_timeout_s: 0.1

  # Размеры очередей
  # Максимальный размер очереди событий
  event_queue_maxsize: 1000
  # Максимальный размер очереди команд
  command_queue_maxsize: 100
  # Максимальный размер очереди shift register
  shift_queue_maxsize: 50
  # Максимальный размер очереди мультиплексора
  mux_queue_maxsize: 100
  # Максимальный размер очереди звука
  sound_queue_maxsize: 20

# ── Логирование ──
# INFO для production на OrangePi Zero
logging:
  level: INFO
  format: "%(asctime)s %(name)s [%(levelname)s] %(message)s"
  # Детальная настройка по модулям (опционально)
  loggers:
    asyncio: WARNING
    scud_lgtu.application.lgtu_application: INFO
    scud_lgtu.application.handlers: INFO
    scud_lgtu.infrastructure.gpio.shift_register: WARNING
    scud_lgtu.infrastructure.gpio.multiplexor: WARNING
    scud_lgtu.domain.turnstile: INFO

# ── Тестовый HTTP API ──
api:
  enabled: true
  host: "0.0.0.0"
  port: 8080
